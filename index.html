<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>連加法幼兒掌握評估系統 - Miss Elsa</title>
    <style>
        :root {
            --purple: #8e7ab5;
            --error-red: #ff3b30;
            --success-green: #4cd964;
            --font-size-base: clamp(1rem, 3.5vmin, 2.5rem);
            --icon-size-base: clamp(3rem, 12vmin, 8rem);
        }

        body { 
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; background-color: #f8f9fb; touch-action: manipulation;
        }

        header { 
            background: #fff; padding: 1vh 5vw; height: 6vh;
            font-size: clamp(1.2rem, 3vmin, 1.8rem); font-weight: bold; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #ddd;
        }

        main { flex: 1; display: flex; padding: 2vmin; gap: 2vmin; overflow: hidden; }
        
        .zone { 
            flex: 1; border-radius: 30px; border: 6px solid #fff; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-around; padding: 2vh 1vw; background: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); transition: all 0.3s ease;
        }

        .highlight-hint { 
            border-color: var(--purple) !important; 
            animation: pulse-purple 1s infinite alternate; 
        }
        @keyframes pulse-purple { 
            from { box-shadow: 0 0 5px var(--purple); transform: scale(1); } 
            to { box-shadow: 0 0 30px var(--purple); transform: scale(1.02); } 
        }

        .error-shake { 
            border-color: var(--error-red) !important; 
            animation: shake 0.4s ease-in-out; 
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .activity-img { 
            font-size: var(--icon-size-base); display: flex; flex-wrap: wrap; 
            justify-content: center; align-content: center; line-height: 1.1; height: 45%;
        }

        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1vmin; width: 90%; }
        .num-btn { 
            padding: 1.5vh 0; font-size: var(--font-size-base);
            border: 2px solid #eee; background: #fff; border-radius: 15px; 
            cursor: pointer; font-weight: bold; color: #444; 
        }
        .num-btn.active { background: var(--purple) !important; color: white !important; }
        .num-btn:disabled { opacity: 0.3; }

        footer { 
            background: white; padding: 2vh 1vw; border-top: 8px solid var(--purple); 
            text-align: center; height: 32vh; display: flex; flex-direction: column; justify-content: center;
        }

        .formula-box { 
            font-size: clamp(2.5rem, 8vmin, 6rem); font-weight: bold; 
            display: flex; align-items: center; justify-content: center; gap: 2vw; margin-bottom: 2vh;
        }
        
        .f-part { padding: 0 1.5vw; border: 4px solid transparent; border-radius: 20px; min-width: 1.2em; color: #333; }
        .f-part.correct { color: var(--success-green); }

        .ans-placeholder { 
            width: 12vmin; height: 12vmin; border: 6px solid var(--purple); 
            border-radius: 25px; display: inline-flex; justify-content: center; 
            align-items: center; color: var(--purple); background: #fdfbff; 
        }

        .ans-selector { display: flex; justify-content: center; gap: 1.5vw; }
        .ans-btn { 
            width: clamp(55px, 8vmin, 90px); height: clamp(55px, 8vmin, 90px); 
            font-size: clamp(1.5rem, 4vmin, 2.5rem); border: 3px solid var(--purple); 
            background: white; border-radius: 50%; cursor: pointer; font-weight: bold; color: var(--purple); 
        }

        #next-btn { 
            position: absolute; right: 4vw; bottom: 4vh;
            padding: 2vh 6vw; font-size: clamp(1.2rem, 3vmin, 2rem);
            background: var(--success-green); color: white; border: none; 
            border-radius: 60px; cursor: pointer; display: none; font-weight: bold;
        }

        #end-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
            text-align: center; padding: 20px;
        }
        .eval-card { background: #fff; border: 4px solid var(--purple); border-radius: 30px; padding: 30px; max-width: 70%; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .eval-title { font-size: 8vh; font-weight: bold; margin-bottom: 10px; }
        .end-badge { margin-top: 30px; padding: 2vh 8vw; font-size: 3vh; color: #999; border: 2px solid #eee; border-radius: 50px; background: #f9f9f9; display: inline-block; }
    </style>
</head>
<body>

<div id="end-overlay">
    <div class="eval-card">
        <div id="eval-header" class="eval-title">評估結束</div>
        <p style="font-size: 4vh;">最終得分：<span id="final-score" style="color:var(--success-green); font-weight: bold;">0</span></p>
        <div id="eval-feedback" style="font-size: 3vh; color: #666; line-height: 1.5; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 20px;">
            分析中...
        </div>
        <div class="end-badge">評估已完成，請交還老師</div>
    </div>
</div>

<header>
    <div style="color: var(--error-red);">⏱️ 剩餘時間: <span id="timer">05:00</span></div>
    <div style="color: var(--purple);">得分: <span id="score">0</span></div>
</header>

<main id="stage"></main>

<footer>
    <div class="formula-box">
        <span id="f-0" class="f-part">?</span> + 
        <span id="f-1" class="f-part">?</span> + 
        <span id="f-2" class="f-part">?</span> = 
        <div class="ans-placeholder" id="f-ans">?</div>
    </div>
    <div id="ans-area" class="ans-selector"></div>
    <button id="next-btn" onclick="initGame()">下一題 👉</button>
</footer>

<script>
    const activities = [
        { name: "乒乓球", icon: "🏓", color: "#eef2ff" },
        { name: "籃球", icon: "🏀", color: "#fff7ed" },
        { name: "跑步", icon: "🏃", color: "#f0fdfa" },
        { name: "武術", icon: "🥋", color: "#fcf4ff" },
        { name: "繪畫", icon: "🎨", color: "#fff1f2" }
    ];

    let score = 0, timeLeft = 300, timerInterval;
    let targetCounts = [], zoneLocked = [false, false, false], finalLocked = false;
    let audioCtx = null;

    function playBeep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 523.25; 
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function speakHK(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-HK';
        utter.rate = 1.0;
        window.speechSynthesis.speak(utter);
    }

    function startTimer() {
        if(timerInterval) return;
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').textContent = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) endGame();
        }, 1000);
    }

    function initGame() {
        if(!timerInterval) startTimer();
        const selected = [...activities].sort(() => 0.5 - Math.random()).slice(0, 3);
        targetCounts = [Math.floor(Math.random()*3)+1, Math.floor(Math.random()*3)+1, Math.floor(Math.random()*3)+1];

        zoneLocked = [false, false, false];
        finalLocked = false;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('f-ans').textContent = '?';
        document.getElementById('f-ans').className = 'ans-placeholder';

        const stage = document.getElementById('stage');
        stage.innerHTML = '';
        selected.forEach((act, i) => {
            let btns = '';
            for(let n=1; n<=5; n++) btns += `<button class="num-btn" id="btn-${i}-${n}" onclick="checkZone(${i},${n})">${n}</button>`;
            stage.innerHTML += `
                <div class="zone" id="zone-${i}" style="background-color:${act.color}">
                    <div style="font-size:clamp(1rem, 2.5vmin, 1.8rem); font-weight:bold; color:#666;">${act.name}</div>
                    <div class="activity-img">${act.icon.repeat(targetCounts[i])}</div>
                    <div class="num-grid">${btns}</div>
                </div>`;
            document.getElementById(`f-${i}`).textContent = '?';
            document.getElementById(`f-${i}`).className = 'f-part';
        });

        const ansArea = document.getElementById('ans-area');
        ansArea.innerHTML = '';
        for(let n=1; n<=10; n++) ansArea.innerHTML += `<button class="ans-btn" onclick="checkFinal(${n})">${n}</button>`;
    }

    function checkZone(idx, val) {
        if(zoneLocked[idx]) return;
        const zone = document.getElementById(`zone-${idx}`);
        const fPart = document.getElementById(`f-${idx}`);
        zone.classList.remove('error-shake', 'highlight-hint');
        
        if(val === targetCounts[idx]) {
            zoneLocked[idx] = true;
            zone.style.borderColor = "var(--success-green)";
            fPart.textContent = val;
            fPart.classList.add('correct');
            document.querySelectorAll(`#zone-${idx} .num-btn`).forEach(b => b.disabled = true);
            document.getElementById(`btn-${idx}-${val}`).classList.add('active');
        } else {
            zone.classList.add('error-shake');
            speakHK("我哋再睇清楚數量。");
            setTimeout(() => zone.classList.remove('error-shake'), 500);
        }
    }

    function checkFinal(val) {
        if(finalLocked) return;
        if(zoneLocked.includes(false)) {
            speakHK("我哋先數咗上面嘅數量先啦！");
            zoneLocked.forEach((locked, i) => { if(!locked) document.getElementById(`zone-${i}`).classList.add('highlight-hint'); });
            return;
        }

        const ansBox = document.getElementById('f-ans');
        const realSum = targetCounts.reduce((a, b) => a + b, 0);
        
        if(val === realSum) {
            finalLocked = true;
            score++;
            document.getElementById('score').textContent = score;
            ansBox.textContent = val;
            ansBox.style.color = 'var(--success-green)';
            ansBox.style.borderColor = 'var(--success-green)';
            document.getElementById('next-btn').style.display = 'block';
            speakHK("正確，恭喜你。");
        } else {
            ansBox.classList.add('error-shake');
            speakHK("我哋再計算清楚數量。");
            setTimeout(() => ansBox.classList.remove('error-shake'), 500);
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        playBeep();
        document.getElementById('final-score').textContent = score;
        
        let header = "";
        let feedback = "";
        
        if(score >= 10) {
            header = "表現出色！🌟";
            feedback = "教師評估：幼兒已完全掌握三數連加概念，計算反應敏捷且準確，可嘗試更大數值的練習。";
        } else if(score >= 6) {
            header = "表現穩定！👍";
            feedback = "教師評估：幼兒能正確完成連加程序，掌握度良好。建議多加練習提升數感的視覺掃描速度。";
        } else if(score >= 3) {
            header = "繼續努力！🌱";
            feedback = "教師評估：幼兒正處於建立連加概念的階段。建議加強手口一致的點數訓練，降低對數字的混淆。";
        } else {
            header = "加油練習！📝";
            feedback = "教師評估：幼兒需更多個別引導，建議先回歸二數加法或 10 以內的實物點數與數量配對練習。";
        }

        document.getElementById('eval-header').textContent = header;
        document.getElementById('eval-feedback').textContent = feedback;
        document.getElementById('end-overlay').style.display = 'flex';
        speakHK("時間到！練習結束，請睇睇評估結果。");
    }

    window.onload = initGame;
</script>
</body>
</html>
